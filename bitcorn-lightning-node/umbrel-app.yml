manifestVersion: 1

id: bitcorn-lightning-node
name: BitCorn Lightning
tagline: Self-optimizing Lightning capital allocation engine
icon: https://raw.githubusercontent.com/ethancail/bitcorn-lightning-application/main/app/web/public/icon.png
category: Finance
version: "1.14.2"
port: 3200

description: >
  Bitcorn Lightning is a Lightning Treasury Capital Allocation Engine for
  hub-and-spoke Lightning Service Providers. It allocates capital across
  channels intelligently, rebalances only when profitable, tracks true net
  yield (forwarding fees minus rebalance costs), and enforces strict capital
  guardrails. Features per-channel ROI scoring, dynamic fee adjustment, peer
  profitability ranking, and automated capital rotation. Includes a dual-role
  web UI — treasury dashboard for the hub operator and member dashboard for
  spoke nodes — with in-app channel creation, Coinbase Onramp for on-chain
  funding, and self-custodial Bitcoin withdrawals via built-in Loop.

developer: Bitcorn
website: https://github.com/ethancail/bitcorn-lightning-application
dependencies:
  - lightning
repo: https://github.com/ethancail/bitcorn-lightning-application
support: https://github.com/ethancail/bitcorn-lightning-application/issues
gallery: []
releaseNotes: >
  v1.14.1: Closes the Stage 4 TREASURY_API_URL distribution gap.
  Members now discover the treasury's HTTP API URL via the Worker's
  /treasury-info response (new api_url field), so the treasury operator
  only sets `wrangler secret put TREASURY_API_URL` ONCE and every
  member auto-picks it up on the next token-refresh tick — no per-member
  SSH required. Precedence on member nodes: (1) local TREASURY_API_URL
  env if set (operator override), (2) Worker /treasury-info api_url,
  (3) transport_error if neither configured. Treasury nodes continue
  to hit localhost via the existing self-mint carve-out. v1.14.0
  installs already deployed with a local TREASURY_API_URL env keep
  working unchanged. Operator setup: after upgrading the Worker,
  `echo -n "http://<treasury-tailnet-ip>:3101" | npx wrangler secret
  put TREASURY_API_URL` and redeploy — done. No schema, no migration.

  v1.14.0: Subscription rail wiring — Stages 1-4 of the on-chain monthly
  member-subscription system. Four new migrations (036-039) add four
  tables (subscription_policy, subscription, subscription_payment,
  subscription_pending_attribution) plus a singleton local_token cache.
  System defaults are safe: address allocation is gated on a one-time
  operator advisory ack via POST /api/admin/subscription/acknowledge-first-run;
  the Tier 2 routing gate is wired at the existing payInvoice chokepoint
  but is a structural no-op until member nodes have local subscription
  state; the Tier 3 cooperative-close scheduler ships in DRY-RUN mode
  by default (SUBSCRIPTION_TIER3_LIVE=false) and only structured-logs
  "would_close" events. Subscription scope is bounded by lane purpose
  — only merchant-lane and farmer-lane channels are subscribers;
  external-peer (e.g., ACINQ) and unclassified channels are exempt
  entirely with three layers of defense-in-depth against accidental
  Tier 3 close. Stage 4 adds Ed25519 entitlement tokens issued at
  POST /api/subscription/token (signed challenge auth via LND's
  signMessage), 24h JWT lifetime, scope=full|prepay claims; member
  nodes cache their JWT in subscription_local_token and refresh every
  ~12h. Worker validation expects a new SUBSCRIPTION_PUBLIC_KEY
  Cloudflare secret — copy from GET /api/admin/subscription/public-key
  after first boot. Operator setup notes: (1) for the system to do
  anything at all, the treasury operator must POST the first-run ack;
  (2) for member nodes to fetch tokens, set TREASURY_API_URL in their
  .env pointing at the treasury's reachable API URL; (3) Worker
  endpoints are now scope-gated — /prices and /prices/corn-history
  require prepay scope, /valuation/* requires full scope, HMAC and
  public-flow endpoints unchanged. UI for member-facing subscription
  status + admin subscriptions view ships in a future release.

  v1.13.21: Fix a sawtooth artifact in the BTC Moving Averages and
  Power Law charts that appeared starting around 2026-02-26. Coinbase's
  v2 historic-prices endpoint has been silently downsampling responses
  (~305 entries spanning 365 days, with roughly 14 missing dates in
  any 90-day window). The chart's gap-fill chain was falling back to
  the live spot price on those missing dates, producing a zigzag
  between real and current prices once power-law-data.json's baked
  values ran out (Feb 20). Now Charts.tsx linearly interpolates between
  adjacent known prices before passing the map to the chart components.
  Affects all three charts that consume the historic map (PowerLaw,
  Moving Averages, Corn-Bitcoin ratio). Frontend-only fix; longer term
  we should switch to a denser BTC price source.

  v1.13.20: Correct the Miner Outflows metric metadata shipped in
  v1.13.19. The original chart URL pointed at a slug that doesn't
  exist on Glassnode; the canonical metric is the "Miner Outflow
  Multiple" (mining.MinersOutflowMultiple) — a stationary ratio of
  current miners' outflow to its 365-day MA in USD, structurally
  parallel to Puell Multiple. Renames the form row label from
  "Miner Outflows" → "Miner Outflow Multiple" (3 places: DayForm,
  worker adapter, InputsTab DISPLAY_ORDER) and tightens the
  typicalRange to "0.5 to 3" with a real Glassnode chart URL. DB
  key (miner_outflows), composite weight (0.04), and adapter source
  ("manual") are unchanged. No backend behavior change.

  v1.13.19: Miner Outflows switches from CryptoQuant auto-fetch to
  manual entry. The auto-fetch had been silently returning empty
  results because no CRYPTOQUANT_API_KEY was set on the Worker, and
  the Composite Model Inputs table mislabeled the empty cell as
  "Manual entry" — confusing because no input field existed for it.
  Now operators enter 9 manual metrics weekly via /valuation-input
  (was 8); the 3 computed-locally price-history inputs are unchanged.
  Composite weight stays at 0.04. The new Miner Outflows form row
  points at a Glassnode chart URL that should be verified before
  relying on it. Existing entries' calendar completeness will read
  X/9 instead of X/8 until backfilled.

  v1.13.18: Fix the "Refresh now" button so the Composite Model Inputs
  table re-fetches after the Worker accepts the trigger. Previously
  the Worker engine ran successfully and KV got new values, but the
  React table only fetched once on mount and never refreshed until
  the operator reloaded the page. Now the parent page bumps a
  refresh-key prop ~4 seconds after the success toast (giving the
  engine time to finish writing KV), and InputsTab re-fetches
  /valuation/inputs to display the new values inline. No Worker or
  schema changes.

  v1.13.17: "Refresh now" button on the Valuation Inputs page. Lets a
  treasury operator trigger the Worker's valuation engine on demand
  (the same job that runs nightly at 00:15 UTC), so manual edits and
  Worker-side adapter changes can flow into the Composite Valuation
  Model card immediately rather than waiting for the cron tick. The
  button appears next to the "Composite Model Inputs" header and
  surfaces a success/error toast inline. Backed by a new treasury-only
  POST /api/valuation/refresh-worker endpoint that signs the existing
  HMAC contract — no new secrets to configure.

  v1.13.16: Tightened wording on two SAGE valuation inputs the finance
  owner flagged as ambiguous. Hash Ribbons now reads "30D MA ÷ 60D MA
  of hashrate" (the actual ratio, not a binary crossover signal), and
  Realized Cap HODL Waves reads "% of realized cap held in 1y–2y band"
  (the percentage in the 1–2 year age band). Description-only change
  in the operator-facing Valuation Inputs form; no behavior, schema,
  or Worker changes.

  v1.13.15: Auto-Buy verification diagnostics. When a Coinbase CDP key
  fails verification at save time (401/403/etc), the actual Coinbase
  error response now lands in docker logs under
  [autobuy-credentials-post] / [autobuy-credentials-verify] prefixes,
  and the dashboard toast surfaces the underlying detail instead of
  just "verification_failed". Operators hitting an IP-allowlist /
  permissions / key-format issue now get an actionable error message
  on the first try, and treasury operators with shell access can
  grep docker logs for the same string. No backend behavior change.

  v1.13.14: More Auto-Buy onboarding copy. Two gaps that bit a real
  operator during smoke-test setup. (1) Coinbase's CDP create-key
  dialog defaults to Ed25519 signature algorithm, which our scheduler
  (ES256/ECDSA) rejects with key_name_and_private_key_required at
  save time — disconnected card now points operators to Advanced
  Settings → Signature algorithm → ECDSA. Permissions guidance
  reframed under "API restrictions" header for parallel structure.
  (2) The not-yet-whitelisted state previously had only one sentence
  + a help link about Coinbase's address allowlist; replaced with
  explicit 6-step inline instructions and a clearer warning that
  "I've whitelisted this in Coinbase" only flips a local flag —
  skipping the Coinbase-side step lets buys place but causes the
  72h sweep to fail. No backend changes.

  v1.13.13: Auto-Buy onboarding copy. The disconnected Coinbase card on
  the Auto-Buy page now spells out the three required CDP API key
  permissions (View, Trade, Transfer) and warns that a key missing
  Transfer will pass save-time verification but fail silently 72h later
  at the sweep step. Also reassures operators that signing in at
  portal.cdp.coinbase.com uses their normal Coinbase account — no
  separate developer account is required. Helper link renamed
  "Cloud Key" → "CDP API Key" for terminology consistency. No backend
  changes.

  v1.13.12: Calendar-based valuation input UI. Replaces the flat 8-metric
  /valuation-input form with a year/month/day navigable calendar. Year
  view shows a 12-row heatmap of completeness across the year; month
  view shows a standard calendar grid with X/8 completeness badges per
  day; day view is the existing 8-metric form scoped to a specific date,
  with per-metric Save, Save All, and per-metric Delete. Operator can
  now backdate entries (fix April 27 dummy values, fill in missed days)
  and edit/delete prior entries by clicking any day. Future dates are
  disabled. URL state (?view=...&date=YYYY-MM-DD) supports deep links.
  No backend changes — wires the API endpoints shipped in v1.13.11
  (PR #138).

  v1.13.11: Corrects the Glassnode tier estimates from v1.13.10 with
  actual operator findings (2026-04-28). Reality is grimmer than the
  estimates: 1 of 8 free (SOPR), 7 of 8 require paid Glassnode tier.
  Also fixes the broken HODL Waves chart URL — Glassnode uses the
  abbreviated slug `supply.RcapHodlWaves` (Rcap = Realized Cap), not
  the full word that v1.13.10 had. Summary callout shows confirmed
  counts and "paid subscription required" verdict with amber border;
  per-row tier badges color-coded green/amber. No backend changes.

  v1.13.10: Adds an estimated Glassnode-tier indicator next to each
  metric on the /valuation-input page, plus a summary callout at the
  top showing how many of the 8 metrics likely need a paid Glassnode
  subscription versus free chart view. Helps the operator scope the
  right Glassnode plan before subscribing — visit each chart link to
  verify, since estimates are based on Glassnode's typical free-vs-paid
  split. No backend changes.

  v1.13.9: Restores the DCA / Valuation surface that was hidden in
  v1.13.0–v1.13.7. The Auto-Buy page gets its tabbed layout back
  (Valuation Chart + DCA Strategy), the Zone Multipliers editor is
  visible again, the Z-score-aware "next buy" banner returns, the
  Valuation Inputs sidebar link is back, and the treasury Dashboard
  shows the valuation-input staleness banner again. Operators populate
  the 8 Glassnode-sourced metrics manually at /valuation-input
  (MVRV, Puell, SOPR, Reserve Risk, NVT, Hash Ribbons, Difficulty
  Ribbon, HODL Waves). The other 4 inputs (Stock-to-Flow, 200W MA,
  Pi Cycle, Miner Outflows) auto-fetch. No backend changes.

  v1.13.8: Liquidity page overhaul. Replaces the radial NetworkGraph
  with a role-aware layout: KPI banner up top (total deployed,
  merchants send-ready, farmers receive-ready), slim interactive
  topology beneath, then two role lanes (merchants by send capacity,
  farmers by receive capacity) sorted urgency-first. Hover or click a
  topology peer to scroll-and-pulse its lane row. Smooth FLIP animation
  when refresh changes the order. External / unclassified peers in a
  collapsible section below. No backend changes.

  v1.13.7: Hides the "valuation inputs need attention" banner from the
  treasury Dashboard while the DCA/Valuation surface is paused (matches
  the v1.13.0 hide of the Auto-Buy Valuation tab, Zone Multipliers, and
  Valuation Inputs sidebar link). The ValuationInputAlertBanner component
  file stays on disk — unhiding is a one-line import + render restore
  when the data-source question resolves. No backend changes.

  v1.13.6: Charts ticker strip polish. Swaps hardcoded hex colors
  for CSS tokens (new --purple / --purple-glow for Soybeans), uses
  currentColor on SVG icons so theme switches cascade properly.
  Small readability tweaks: firmer border on loaded tickers, slightly
  larger unit text, less-washed dollar sign, hover background shift.
  No backend changes. Completes the UI polish brief's attack order
  (7/7 pages shipped).

  v1.13.5: Contacts page polish. Edit-mode contact cards and the Add
  Contact form now use Briefing Room chrome (amber border-top +
  tinted header); display cards stay plain. Clear visual signal:
  amber means "you're editing this." No backend changes.

  v1.13.4: Channels page lane-table polish. Applies Briefing Room
  chrome (amber border-top + tinted header) to the 4 treasury lane
  panels (Merchant / Farmer / External / Unclassified) plus the
  Treasury Open Channel panel at the bottom. Tighter row padding on
  lane tables via a .panel.ops .data-table descendant rule — no
  spillover to other data-table consumers (Peers, Payments,
  MemberLiquidity). Member /channels view and close-channel dialog
  unchanged. No backend changes.

  v1.13.3: Treasury Dashboard polish. Collapses the top-of-page
  balances and Fund-Node CTA into a single compact row. Revenue
  panel gains a big hero net-24h number with explicit +/- sign, and
  the forwarding-fees / rebalance-costs rows use the Briefing Room
  policy-card vocabulary from the Settings and Wizard pages. All-time
  values surface inline in each card's meta line. Bitcoin price chart
  shrunk from 220px to 120px (y-axis still shown). No backend changes.

  v1.13.2: Member Dashboard polish. Compact top strip (on-chain /
  channel / total balances + Fund Node CTA inline, matching treasury).
  Role-aware channel panel gains Briefing Room chrome (amber border-top
  + tinted header); hero number's color now follows role-aware urgency
  (merchant: low = red, farmer: high = red, unknown: neutral). Status
  row compressed to a single line. Forwarded Fees panel and pending /
  no-channel / upgrade states inherit the same chrome. No backend
  changes.

  v1.13.1: Wizard polish. Trims first-run setup from 5 steps to 4 by
  folding the TREASURY_PUBKEY env-var reminder inline into the Node
  Detection step. New vertical step rail shows all step names at once.
  Applies the same amber border-top chrome used on the Settings page's
  operational panels, and renders the Review screen as read-state
  policy cards. Re-running setup from Settings now pre-populates from
  your current live policy instead of resetting to defaults.

  v1.13.0: Auto-Buy DCA surface hidden while the underlying data-feed
  question is resolved. Glassnode's institutional quote came in at $13k
  /year — too steep to justify for 8 metrics. The Auto-Buy page now shows
  only the DCA Strategy view (base unit + frequency + Coinbase onboarding
  + purchase history + master enable/pause). The Valuation Chart tab,
  Zone Multipliers editor, "next-buy Z-score" banner language, and the
  Valuation Inputs sidebar link are hidden. Underlying scheduler,
  credential vault, Coinbase client, caps, and Worker valuation engine
  are unchanged — buys still work, zone multipliers still apply
  server-side (defaulted to Fair Value = 1×, behaving as flat DCA
  until un-hidden). Un-hiding is a grep-and-uncomment exercise when
  the data source lands.

  v1.12.1: Settings page polish. Splits the page into "Personal" and
  "[ Operations ]" sections so critical operational controls visually
  weigh more than personal preferences. Routing Fee Policy and Capital
  Guardrails (treasury) now render as read-only instrument cards by
  default — click Edit or any card to enter edit mode, with Cancel /
  Save / Esc support and an "N unsaved" counter. Channel Role (member),
  Fee Policy and Capital Guardrails gain a subtle amber border-top to
  distinguish them from personal settings. Theme chips switch from IBM
  Plex Mono to Sans so "Dark / Light / System" no longer reads like
  code. No backend changes.

  v1.12.0: Valuation Chart visual upgrade. Replaces the horizontal zone
  bar with a proper semicircle gauge — needle swings from Z = −3 (green,
  Extreme Buy) through Z = 0 (neutral) to Z = +3 (red, Extreme Sell) with
  the current value rendered in the gauge center. Adds a Zone Definitions
  side-panel listing all six zones with their Z-ranges and DCA
  multipliers, highlighting the current zone. Adds a Distribution
  Statistics panel showing composite Z mean, standard deviation, min/max
  (with dates), current Z, current multiplier, and sample size from the
  historical series — the Worker now publishes these stats alongside
  /valuation/current.

  v1.11.4: Three fixes. (1) The valuation Worker no longer publishes a
  bogus "Z=0 / Extreme Sell" state when it has no inputs to composite —
  it now leaves the previous KV value in place on a failed composite run,
  and the zone classifier's non-finite default is now fair_value with
  multiplier 0 (neutral, no-buy) instead of the aggressive extreme_sell.
  (2) The Model Inputs table moved from the public Auto-Buy page to the
  treasury-only Valuation Inputs page — this was leaking which metrics
  the treasury tracks to member nodes. Auto-Buy now has 2 tabs
  (Valuation, DCA Strategy). (3) Clears the stale bogus valuation in KV
  so the next composite run writes clean data.

  v1.11.3: Fix — operator `.env` is now loaded via an `exports.sh` hook
  instead of docker compose's `env_file` directive. v1.11.2's env_file
  approach broke the Umbrel app lifecycle: when umbreld invokes compose
  with its own fragment file listed first, the relative `.env` path
  resolves against the fragment directory (not ours), so compose errors
  out with "env file not found" and app-script exits non-zero. Symptom:
  app tile stuck at "Restarting..." after any restart/update on Umbrel.
  Scaling requires this fix on every member install.

  v1.11.2: Fix — VALUATION_SUBMIT_HMAC now reaches the api container on
  Umbrel installs. The docker-compose.yml now declares the operator's
  .env as a runtime env_file on the api service; previously, compose-time
  ${VAR:-} interpolation silently resolved to empty because Umbrel's app
  runner doesn't cd into the app directory before invoking compose.
  Symptom: manual valuation input Save All returned 503
  valuation_worker_not_configured even with .env correctly set up.

  v1.11.1: Fix — the "How to create a Coinbase Cloud Key" help link in
  the Auto-Buy credential onboarding panel now points to the current CDP
  docs page. Coinbase reorganized their docs; the previous URL returned
  a 404.

  v1.11.0: Coinbase Auto-Buy — valuation-modulated dollar-cost averaging
  on Coinbase. A 12-input composite Z-score sizes each scheduled buy by
  zone multiplier; Coinbase holds for the 72h withdrawal window, then
  sweeps BTC on-chain to your node's wallet. Full operator onboarding:
  paste Coinbase Cloud Key, confirm allowlisted deposit address, flip
  Enable. Dormant by default with per-buy and rolling 7d/30d caps. New
  treasury-only Valuation Inputs page for weekly metric entry; three
  metrics (Stock-to-Flow, 200W MA, Pi Cycle) computed locally from BTC
  price history. Auto-Buy available on both treasury and member nodes.

  v1.10.8: Clickable swap history rows with an expandable detail view
  for Refill Channel and Cash Out — full state timeline, fee breakdown,
  and on-chain txid surface in-place.

  v1.10.7: Loop In private=true — the refill RPC now sets the invoice
  as private so leaf nodes auto-generate route hints, eliminating the
  "no_route" failures that hit merchants connected to the treasury via a
  private channel.

  v1.10.6: Loop In last_hop=treasury — forces the Loop server to route
  the refill payment back through the treasury channel, matching the
  hub-and-spoke topology.

  v1.10.5: Fix — member sidebar now reflects channel role changes saved
  in Settings immediately. Previously the sidebar showed stale labels
  ("Cash Out" after switching to Merchant role) until page reload because
  MemberShell fetched role only on mount.

  v1.10.4: Send capacity visualization on Pay Invoice — pasting a BOLT11
  now checks the decoded amount against the member's send capacity. Same
  two-tier warning pattern as Request Payment (soft warn at 85% of local
  balance, hard block at 100%). Projected channel state shown after decode.

  v1.10.3: Receive capacity visualization on Request Payment — invoice
  creation now shows channel state, receive capacity, max invoice amount,
  and projected channel state. Two-tier warnings prevent invoices that
  exceed routable capacity.

  v1.10.2: Channel close fee selector — operators can pick
  Economy/Normal/Priority fee rates when closing channels instead of
  relying on LND's default estimator (which can pick rates too low to
  confirm).

  v1.10.0: Merchant Refill Channel — merchants can now refill their Lightning
  outbound capacity via Loop In directly from the app. Context-forward UI with
  channel state visualization, advisor-recommended amounts, and preflight route
  probing that prevents expensive failures. WithdrawBitcoin (Cash Out) gains
  pending swap detection across page reloads, channel state bar, and
  direction-specific status messages.
