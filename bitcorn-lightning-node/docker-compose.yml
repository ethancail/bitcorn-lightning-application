services:
  api:
    image: ghcr.io/ethancail/bitcorn-lightning-application/api:1.13.1
    restart: unless-stopped
    ports:
      - "3101:3101"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_LIGHTNING_NODE_DATA_DIR}:/lnd:ro
      # litd data: TLS cert at .lit/tls.cert, Loop macaroon at .loop/<network>/
      - ${APP_DATA_DIR}/litd:/loop-data:ro
    # Operator secrets (VALUATION_SUBMIT_HMAC) are loaded from `.env` next to
    # this file via `exports.sh` (sibling file). We use exports.sh instead of
    # compose's `env_file` directive because under umbreld's legacy-compat
    # invocation, relative env_file paths resolve against the fragment compose
    # file's directory (not ours), so `.env` can't be found. exports.sh runs
    # before docker compose and exports .env vars to the shell, which compose
    # then picks up via `${VAR:-}` interpolation below.
    environment:
      BITCOIN_NETWORK: ${BITCOIN_NETWORK:-mainnet}
      # LND TLS cert SANs include 10.21.21.9 but NOT Docker DNS names.
      LND_GRPC_HOST: 10.21.21.9:10009
      TREASURY_PUBKEY: 02b759b1552f6471599420c9aa8b7fb52c0a343ecc8a06157b452b5a3b107a1bca
      COINBASE_APP_ID: 1cebd598-0a9d-4567-8603-8ef051fd1101
      COINBASE_WORKER_URL: "https://bitcorn-onramp.ethancail.workers.dev"
      LOOP_GRPC_HOST: bitcorn-lightning-node_loopd_1
      LOOP_GRPC_PORT: "8443"
      LOOP_TLS_CERT_PATH: "/loop-data/.lit/tls.cert"
      LOOP_MACAROON_PATH: "/loop-data/.loop/mainnet/loop.macaroon"
      # Valuation manual-input submission — shared HMAC with the Cloudflare Worker.
      # Set this in a `.env` file next to docker-compose.yml (auto-read by Docker
      # Compose; gitignored repo-wide). Generate a fresh secret per install with:
      #   openssl rand -hex 32
      # Put the SAME value on the Worker via:
      #   cd cloudflare-worker && npx wrangler secret put VALUATION_SUBMIT_HMAC
      # If unset, POST /api/valuation/manual returns 503 valuation_worker_not_configured.
      # See .env.example in this directory for the template.
      VALUATION_SUBMIT_HMAC: "${VALUATION_SUBMIT_HMAC:-}"
      # Optional — defaults to COINBASE_WORKER_URL above. Only override if the
      # valuation endpoint ever lives on a different Worker than the Onramp one.
      VALUATION_WORKER_URL: "${VALUATION_WORKER_URL:-}"
    depends_on:
      - loopd
    networks:
      - umbrel

  loopd:
    image: lightninglabs/lightning-terminal:v0.16.1-alpha
    restart: unless-stopped
    volumes:
      - ${APP_LIGHTNING_NODE_DATA_DIR}:/lnd:ro
      - ${APP_DATA_DIR}/litd:/litd-data
    environment:
      HOME: /litd-data
      # litd requires a UI password even when we don't use the UI
      LIT_PASSWORD: bitcorn-internal-unused
    command:
      - litd
      - --lnd-mode=remote
      - --remote.lnd.rpcserver=10.21.21.9:10009
      - --remote.lnd.macaroonpath=/lnd/data/chain/bitcoin/${BITCOIN_NETWORK:-mainnet}/admin.macaroon
      - --remote.lnd.tlscertpath=/lnd/tls.cert
      - --loop-mode=integrated
      - --faraday-mode=disable
      - --pool-mode=disable
      - --taproot-assets-mode=disable
      - --uipassword_env=LIT_PASSWORD
      # gRPC/HTTPS: bind to all interfaces so the API container can connect.
      # Only reachable within the Docker network — not exposed to host.
      - --httpslisten=0.0.0.0:8443
      - --lit-dir=/litd-data/.lit
      - --loop.loopdir=/litd-data/.loop
    networks:
      - umbrel

  web:
    image: ghcr.io/ethancail/bitcorn-lightning-application/web:1.13.1
    restart: unless-stopped
    ports:
      - "3200:3200"
    depends_on:
      - api
    networks:
      - umbrel

networks:
  umbrel:
    external: true
    name: umbrel_main_network
