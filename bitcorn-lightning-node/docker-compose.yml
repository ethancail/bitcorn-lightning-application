services:
  api:
    image: ghcr.io/ethancail/bitcorn-lightning-application/api:1.10.4
    restart: unless-stopped
    ports:
      - "3101:3101"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_LIGHTNING_NODE_DATA_DIR}:/lnd:ro
      # litd data: TLS cert at .lit/tls.cert, Loop macaroon at .loop/<network>/
      - ${APP_DATA_DIR}/litd:/loop-data:ro
    environment:
      BITCOIN_NETWORK: ${BITCOIN_NETWORK:-mainnet}
      # LND TLS cert SANs include 10.21.21.9 but NOT Docker DNS names.
      LND_GRPC_HOST: 10.21.21.9:10009
      TREASURY_PUBKEY: 02b759b1552f6471599420c9aa8b7fb52c0a343ecc8a06157b452b5a3b107a1bca
      COINBASE_APP_ID: 1cebd598-0a9d-4567-8603-8ef051fd1101
      COINBASE_WORKER_URL: "https://bitcorn-onramp.ethancail.workers.dev"
      LOOP_GRPC_HOST: bitcorn-lightning-node_loopd_1
      LOOP_GRPC_PORT: "8443"
      LOOP_TLS_CERT_PATH: "/loop-data/.lit/tls.cert"
      LOOP_MACAROON_PATH: "/loop-data/.loop/mainnet/loop.macaroon"
    depends_on:
      - loopd
    networks:
      - umbrel

  loopd:
    image: lightninglabs/lightning-terminal:v0.16.1-alpha
    restart: unless-stopped
    volumes:
      - ${APP_LIGHTNING_NODE_DATA_DIR}:/lnd:ro
      - ${APP_DATA_DIR}/litd:/litd-data
    environment:
      HOME: /litd-data
      # litd requires a UI password even when we don't use the UI
      LIT_PASSWORD: bitcorn-internal-unused
    command:
      - litd
      - --lnd-mode=remote
      - --remote.lnd.rpcserver=10.21.21.9:10009
      - --remote.lnd.macaroonpath=/lnd/data/chain/bitcoin/${BITCOIN_NETWORK:-mainnet}/admin.macaroon
      - --remote.lnd.tlscertpath=/lnd/tls.cert
      - --loop-mode=integrated
      - --faraday-mode=disable
      - --pool-mode=disable
      - --taproot-assets-mode=disable
      - --uipassword_env=LIT_PASSWORD
      # gRPC/HTTPS: bind to all interfaces so the API container can connect.
      # Only reachable within the Docker network — not exposed to host.
      - --httpslisten=0.0.0.0:8443
      - --lit-dir=/litd-data/.lit
      - --loop.loopdir=/litd-data/.loop
    networks:
      - umbrel

  web:
    image: ghcr.io/ethancail/bitcorn-lightning-application/web:1.10.4
    restart: unless-stopped
    ports:
      - "3200:3200"
    depends_on:
      - api
    networks:
      - umbrel

networks:
  umbrel:
    external: true
    name: umbrel_main_network
