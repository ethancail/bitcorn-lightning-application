services:
  api:
    image: ghcr.io/ethancail/bitcorn-lightning-application/api:1.8.0
    restart: unless-stopped
    ports:
      - "3101:3101"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_LIGHTNING_NODE_DATA_DIR}:/lnd:ro
      - ${APP_DATA_DIR}/loop:/loop-data:ro
    environment:
      BITCOIN_NETWORK: ${BITCOIN_NETWORK:-mainnet}
      LND_GRPC_HOST: 10.21.21.9:10009
      TREASURY_PUBKEY: 02b759b1552f6471599420c9aa8b7fb52c0a343ecc8a06157b452b5a3b107a1bca
      COINBASE_APP_ID: 1cebd598-0a9d-4567-8603-8ef051fd1101
      COINBASE_WORKER_URL: "https://bitcorn-onramp.ethancail.workers.dev"
      LOOP_GRPC_HOST: bitcorn-lightning-node_loopd_1
      LOOP_GRPC_PORT: "11010"
    depends_on:
      - loopd
    networks:
      - umbrel

  loopd:
    image: lightninglabs/loop:v0.31.0-beta
    restart: unless-stopped
    volumes:
      - ${APP_LIGHTNING_NODE_DATA_DIR}:/lnd:ro
      - ${APP_DATA_DIR}/loop:/loop-data
    environment:
      HOME: /loop-data
    command:
      - loopd
      - --network=${BITCOIN_NETWORK:-mainnet}
      - --lnd.host=10.21.21.9:10009
      - --lnd.macaroonpath=/lnd/data/chain/bitcoin/${BITCOIN_NETWORK:-mainnet}/admin.macaroon
      - --lnd.tlspath=/lnd/tls.cert
      - --tlsautorefresh
      - --restlisten=0.0.0.0:8081
      - --rpclisten=0.0.0.0:11010
      - --loopdir=/loop-data/.loop
      - --tlscertpath=/loop-data/.loop/tls.cert
      - --tlskeypath=/loop-data/.loop/tls.key
      - --macaroonpath=/loop-data/.loop/${BITCOIN_NETWORK:-mainnet}/loop.macaroon
    networks:
      - umbrel

  web:
    image: ghcr.io/ethancail/bitcorn-lightning-application/web:1.8.0
    restart: unless-stopped
    ports:
      - "3200:3200"
    depends_on:
      - api
    networks:
      - umbrel

networks:
  umbrel:
    external: true
    name: umbrel_main_network
