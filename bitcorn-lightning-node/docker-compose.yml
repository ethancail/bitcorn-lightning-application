services:
  api:
    image: ghcr.io/ethancail/bitcorn-lightning-application/api:latest
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_LIGHTNING_NODE_DATA_DIR}:/lnd:ro
    environment:
      BITCOIN_NETWORK: ${BITCOIN_NETWORK:-mainnet}
      LND_GRPC_HOST: ${LND_GRPC_HOST:-lightning_lnd_1:10009}
      TREASURY_PUBKEY: 02b759b1552f6471599420c9aa8b7fb52c0a343ecc8a06157b452b5a3b107a1bca
      COINBASE_APP_ID: 1cebd598-0a9d-4567-8603-8ef051fd1101
    networks:
      - umbrel

  web:
    image: ghcr.io/ethancail/bitcorn-lightning-application/web:latest
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - umbrel

networks:
  umbrel:
    external: true
    name: umbrel_main_network
