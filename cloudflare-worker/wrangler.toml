name = "bitcorn-onramp"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Required by @cloudflare/vitest-pool-workers 0.5.x. Enables Node.js standard
# library compatibility (needed because vitest imports node modules internally).
# The vitest.config.ts override added in Task 1 becomes redundant once this is
# here, but leaving both is harmless.
compatibility_flags = ["nodejs_compat"]

# Daily cron at 00:15 UTC — triggers valuation engine refresh.
# (5-field form: minute hour day-of-month month day-of-week)
[triggers]
crons = ["15 0 * * *"]

[[kv_namespaces]]
binding = "PRICES_CACHE"
id = "62c68c41830141cc8b0b6e7cdb193461"

# Secrets required (set via `wrangler secret put <NAME>`; never checked in):
#   CDP_KEY_NAME            — existing (Coinbase Onramp)
#   CDP_PRIVATE_KEY         — existing (Coinbase Onramp)
#   USDA_NASS_KEY           — existing (commodity prices)
#   CRYPTOQUANT_API_KEY     — valuation: miner_outflows (CryptoQuant free tier)
#   PLANB_API_KEY           — valuation: stock_to_flow (OPTIONAL — falls through
#                              to unauthenticated endpoint if unset)
#   VALUATION_SUBMIT_HMAC   — shared secret between treasury node and Worker
#                              for authenticating POST /valuation/manual
#   SUBSCRIPTION_PUBLIC_KEY — base64url-encoded Ed25519 public key for JWT
#                              validation on member-gated endpoints
#
#   ─── Stablecoin rail (per spec §5; added 2026-05-21) ─────────────────
#   BASE_SEPOLIA_RPC_URL              — secret; full Alchemy/Coinbase Node URL
#                                       with embedded API key
#   SETTLEMENT_ROUTER_ADDRESS         — env var; deployed SettlementRouter
#                                       (testnet: 0xF1Bc89974f8520b7f98e7cF0C689a7077aF04c78)
#   USDC_TOKEN_ADDRESS                — env var; USDC on the target chain
#                                       (Base Sepolia: 0x036CbD53842c5426634e7929541eC2318f3dCF7e)
#   SETTLEMENT_ROUTER_DEPLOY_BLOCK    — env var; block where the router was
#                                       deployed (Base Sepolia: 41851566 — used
#                                       by §7 sync loop's starting cursor)
#   BASE_CHAIN_ID                     — env var; "84532" for Sepolia, "8453"
#                                       for mainnet
#
#   Local dev: put these in .dev.vars (gitignored) so `wrangler dev` picks them
#   up automatically. Production: `wrangler secret put` for the RPC URL,
#   `wrangler deploy` for the rest as env vars.
#
# Removed after 2026-04-17 manual-input pivot:
#   GLASSNODE_API_KEY       — 8 Glassnode metrics now manually entered via the
#                              treasury node; Worker no longer calls Glassnode.
#   LOOKINTOBITCOIN_API_KEY — 200W MA + PI Cycle now computed locally from
#                              CoinGecko price history (no API key needed).
